kind: Job
apiVersion: batch/v1

metadata:
  name: data-migration-job
  namespace: easyshop-ns
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation

spec:
  template:
    spec:
      containers:
      - name: migration-job
        image: hiimanshupawar/easyshop-migration:747d79b20013fbb7f8e1d0aff0e41d2a8fc73c34
        imagePullPolicy: Always
        env:
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: easyshop-configmap
              key: MONGODB_URI
      restartPolicy: OnFailure 