name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'kubernetes/**'

env:
  DOCKER_IMAGE_NAME: easyshop
  DOCKER_MIGRATION_IMAGE_NAME: easyshop-migration
  IMAGE_TAG: ${{ github.sha }}
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}

jobs:
  build_and_push:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Easyshop Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{env.DOCKER_IMAGE_NAME}}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_USERNAME }}/${{env.DOCKER_IMAGE_NAME}}:latest

      - name: Build and Push Data Migration Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./scripts/Dockerfile.migration
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{env.DOCKER_MIGRATION_IMAGE_NAME}}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_USERNAME }}/${{env.DOCKER_MIGRATION_IMAGE_NAME}}:latest

  update_k8s_manifests:
    if: github.actor != 'github-actions[bot]'
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: pawarhimanshu934/TWS-ECommerce
          token: ${{ secrets.PAT_TOKEN }}

      - name: Update k8s Manifests 
        run: |
          echo "Updating Image name tags in K8 manifests - deployement and data migration (if exists)"

          sed -i "s|image: .*easyshop:.*|image: $DOCKER_USERNAME/$DOCKER_IMAGE_NAME:$IMAGE_TAG|g" kubernetes/04-deployment.yml
  
          if [ -f kubernetes/10-data-migration.yml ]; then
            sed -i "s|image: .*easyshop-migration:.*|image: $DOCKER_USERNAME/$DOCKER_MIGRATION_IMAGE_NAME:$IMAGE_TAG|g" kubernetes/10-data-migration.yml
          fi

      - name: Commit and Push Updated Manifests
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "action@github.com"

          git add kubernetes/*
          git commit -m "Update k8s manifests with $IMAGE_TAG image tags" || echo "No changes to commit"
          git push origin main