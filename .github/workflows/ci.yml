name: CI

on:
  push:
    branches: [main]

jobs:
  build and push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Easyshop Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${ vars.DOCKER_USERNAME }/easyshop:${ github.sha }
            ${ vars.DOCKER_USERNAME }/easyshop:latest

      - name: Build and Push Data Migration Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./scripts/Dockerfile.migration
          push: true
          tags: |
            ${ vars.DOCKER_USERNAME }/data-migration:${ github.sha }
            ${ vars.DOCKER_USERNAME }/data-migration:latest
